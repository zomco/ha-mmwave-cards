name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"   # daily check at midnight UTC
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin